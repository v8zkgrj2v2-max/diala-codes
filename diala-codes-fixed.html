<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Diala Codes</title>
  <style>
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; font-family: Arial, Helvetica, sans-serif; }
    body { margin: 0; background: #0d0d0d; color: white; min-height: 100vh; }
    .hidden { display: none !important; }
    .auth-page { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; background: radial-gradient(circle at top, #222 0%, #111 40%, #000 100%); }
    .auth-card { width: 100%; max-width: 420px; background: #111; border: 2px solid #fff; border-radius: 24px; padding: 24px; }
    .title { text-align: center; font-size: 34px; font-weight: 800; margin: 0 0 10px; }
    .subtitle { text-align: center; color: #d0d0d0; margin-bottom: 24px; font-size: 15px; }
    .auth-card input { width: 100%; padding: 16px; margin-bottom: 14px; border-radius: 16px; border: 2px solid #666; background: #000; color: white; font-size: 16px; }
    .btn-row { display: flex; gap: 12px; margin-top: 6px; }
    .btn { flex: 1; padding: 15px; border-radius: 16px; border: 2px solid white; background: white; color: black; font-weight: 800; font-size: 16px; }
    .btn.secondary { background: black; color: white; }
    .note { margin-top: 14px; font-size: 13px; color: #cfcfcf; text-align: center; }
    .app { min-height: 100vh; padding-bottom: 30px; }
    .topbar { position: sticky; top: 0; z-index: 20; background: rgba(0,0,0,0.95); border-bottom: 2px solid #fff; padding: 16px; display: flex; justify-content: space-between; align-items: center; gap: 12px; }
    .logo { font-size: 24px; font-weight: 900; }
    .user-box { border: 2px solid white; padding: 10px 14px; border-radius: 999px; font-weight: 700; font-size: 14px; background: #111; }
    .hero { padding: 18px 16px 8px; text-align: center; }
    .grid { padding: 16px; display: grid; grid-template-columns: repeat(2, 1fr); gap: 14px; }
    @media (min-width: 760px) { .grid { grid-template-columns: repeat(3, 1fr); } }
    .card { background: linear-gradient(180deg, #181818, #0d0d0d); border: 2px solid #fff; border-radius: 22px; padding: 16px; min-height: 160px; display: flex; flex-direction: column; justify-content: space-between; }
    .card .emoji { font-size: 34px; margin-bottom: 10px; }
    .card h3 { margin: 0 0 10px; font-size: 20px; }
    .card p { margin: 0; color: #d6d6d6; font-size: 14px; line-height: 1.4; }
    .show-btn,.link-btn { margin-top: 12px; width: 100%; padding: 12px; border-radius: 14px; border: 2px solid white; background: white; color: black; font-weight: 800; font-size: 15px; text-decoration:none; display:block; text-align:center;}
    .link-btn { background:#000; color:#fff; }
    .overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.72); display: flex; align-items: center; justify-content: center; padding: 16px; z-index: 50; }
    .modal { width: 100%; max-width: 700px; max-height: 88vh; overflow: auto; background: #0f0f0f; border: 2px solid white; border-radius: 26px; }
    .modal-top { padding: 18px; border-bottom: 2px solid #fff; display: flex; justify-content: space-between; align-items: center; background: #151515; position: sticky; top:0; }
    .modal-title { font-size: 24px; font-weight: 900; }
    .close-btn { background: white; color: black; border: none; width: 42px; height: 42px; border-radius: 50%; font-size: 20px; font-weight: 900; }
    .modal-content { padding: 20px; }
    .reward-badge { display: inline-block; padding: 8px 14px; border-radius: 999px; border: 2px solid #fff; background: #fff; color: #000; font-weight: 800; margin-bottom: 14px; font-size: 14px; }
    .reward-text { font-size: 16px; line-height: 1.7; color: #efefef; }
    .reward-list { margin: 14px 0 0; padding-left: 18px; color: #ddd; line-height: 1.7; }
  </style>
</head>
<body>
<section id="authPage" class="auth-page">
  <div class="auth-card">
    <h1 class="title">Diala Codes</h1>
    <div class="subtitle">Black & white rewards website for iPad</div>
    <input id="usernameInput" type="text" placeholder="Username" value="Guest" />
    <input id="passwordInput" type="password" placeholder="Password" />
    <div class="btn-row">
      <button class="btn" onclick="enterSite()">Sign In</button>
      <button class="btn secondary" onclick="enterSite()">Sign Up</button>
    </div>
    <div class="note">Fun website only.</div>
  </div>
</section>

<section id="appPage" class="app hidden">
  <div class="topbar">
    <div class="logo">Diala Codes</div>
    <div class="user-box">👤 <span id="topUsername">Guest</span></div>
  </div>
  <div class="hero"><h2>Welcome to Diala Codes</h2></div>
  <div class="grid" id="cardsGrid"></div>
</section>

<div id="overlay" class="overlay hidden">
  <div class="modal">
    <div class="modal-top">
      <div class="modal-title" id="modalTitle">Reward</div>
      <button class="close-btn" onclick="closeReward()">×</button>
    </div>
    <div class="modal-content">
      <div id="modalBadge" class="reward-badge">Reward</div>
      <div id="modalText" class="reward-text"></div>
      <ul id="modalList" class="reward-list"></ul>
      <a id="modalLink" class="link-btn" href="#" target="_blank">Open pictures</a>
    </div>
  </div>
</div>

<script>
const rewards = [
  {title:"SpongeBob",emoji:"🧽",desc:"SpongeBob pictures",badge:"SpongeBob Reward",text:"Tap the button below to open SpongeBob pictures.",list:["SpongeBob cartoon pictures","Funny SpongeBob wallpapers","Yellow cartoon art"],link:"https://www.google.com/search?tbm=isch&q=SpongeBob+cartoon+wallpaper"},
  {title:"Wallpapers",emoji:"🖼️",desc:"Cool wallpapers",badge:"Wallpaper Reward",text:"Tap below for wallpaper pictures.",list:["Black wallpapers","Nature wallpapers","Gaming wallpapers"],link:"https://www.google.com/search?tbm=isch&q=cool+ipad+wallpapers"},
  {title:"Football",emoji:"⚽",desc:"Football pictures",badge:"Football Reward",text:"Tap below for football wallpapers and photos.",list:["Football wallpapers","Player photos","Stadium photos"],link:"https://www.google.com/search?tbm=isch&q=football+wallpaper"},
  {title:"Minecraft",emoji:"⛏️",desc:"Minecraft pictures",badge:"Minecraft Reward",text:"Tap below for Minecraft wallpapers.",list:["Minecraft wallpapers","Minecraft art","Minecraft builds"],link:"https://www.google.com/search?tbm=isch&q=Minecraft+wallpaper"},
  {title:"Cats",emoji:"🐱",desc:"Cute cat pictures",badge:"Cat Reward",text:"Tap below for cat pictures.",list:["Cute kittens","Funny cats","Fluffy cat wallpapers"],link:"https://www.google.com/search?tbm=isch&q=cute+cat+wallpaper"},
  {title:"Cars",emoji:"🚗",desc:"Car pictures",badge:"Car Reward",text:"Tap below for car wallpapers.",list:["Supercars","Racing cars","Cool car posters"],link:"https://www.google.com/search?tbm=isch&q=car+wallpaper"},
  {title:"Cartoons",emoji:"📺",desc:"Cartoon pictures",badge:"Cartoon Reward",text:"Tap below for cartoon pictures.",list:["Funny cartoons","Cute cartoons","Colorful cartoon art"],link:"https://www.google.com/search?tbm=isch&q=cartoon+wallpaper+kids"},
  {title:"Games",emoji:"🎮",desc:"Gaming pictures",badge:"Games Reward",text:"Tap below for gaming wallpapers.",list:["Gaming setup","Game wallpapers","Controllers"],link:"https://www.google.com/search?tbm=isch&q=gaming+wallpaper"},
  {title:"Brawl Stars",emoji:"⭐",desc:"Brawl Stars pictures",badge:"Brawl Stars Reward",text:"Tap below for Brawl Stars wallpapers.",list:["Brawlers","Brawl Stars art","Game wallpapers"],link:"https://www.google.com/search?tbm=isch&q=Brawl+Stars+wallpaper"},
  {title:"Puppies",emoji:"🐶",desc:"Puppy pictures",badge:"Puppy Reward",text:"Tap below for puppy pictures.",list:["Cute puppies","Funny dogs","Puppy wallpapers"],link:"https://www.google.com/search?tbm=isch&q=cute+puppy+wallpaper"},
  {title:"Kids Films",emoji:"🎬",desc:"Kids film pictures",badge:"Kids Films Reward",text:"Tap below for kids movie pictures.",list:["Animated films","Kids movie posters","Family films"],link:"https://www.google.com/search?tbm=isch&q=kids+movies+posters"},
  {title:"Food",emoji:"🍔",desc:"Food pictures",badge:"Food Reward",text:"Tap below for food pictures.",list:["Burger photos","Pizza photos","Desserts"],link:"https://www.google.com/search?tbm=isch&q=food+wallpaper"},
  {title:"Cool Logos",emoji:"🔥",desc:"Logo ideas",badge:"Logo Reward",text:"Tap below for logo pictures.",list:["Gaming logos","Cool symbols","Simple logos"],link:"https://www.google.com/search?tbm=isch&q=cool+logo+design"},
  {title:"Nature Wallpapers",emoji:"🌿",desc:"Nature pictures",badge:"Nature Reward",text:"Tap below for nature wallpapers.",list:["Forests","Mountains","Sky wallpapers"],link:"https://www.google.com/search?tbm=isch&q=nature+wallpaper"},
  {title:"Surprise Box",emoji:"🎁",desc:"Mystery pictures",badge:"Mystery Reward",text:"Tap below for surprise pictures.",list:["Random fun pictures","Cute surprise wallpapers"],link:"https://www.google.com/search?tbm=isch&q=cute+fun+wallpaper"}
];

const authPage=document.getElementById("authPage"), appPage=document.getElementById("appPage"), topUsername=document.getElementById("topUsername"), usernameInput=document.getElementById("usernameInput"), cardsGrid=document.getElementById("cardsGrid");
const overlay=document.getElementById("overlay"), modalTitle=document.getElementById("modalTitle"), modalBadge=document.getElementById("modalBadge"), modalText=document.getElementById("modalText"), modalList=document.getElementById("modalList"), modalLink=document.getElementById("modalLink");

function enterSite(){ let username=usernameInput.value.trim(); if(!username) username="Guest"; topUsername.textContent=username; authPage.classList.add("hidden"); appPage.classList.remove("hidden"); }
function createCards(){ rewards.forEach((item,index)=>{ const card=document.createElement("div"); card.className="card"; card.innerHTML=`<div><div class="emoji">${item.emoji}</div><h3>${item.title}</h3><p>${item.desc}</p></div><button class="show-btn" onclick="openReward(${index})">Show</button>`; cardsGrid.appendChild(card); });}
function openReward(index){
  const item=rewards[index];
  modalTitle.textContent=item.title;
  modalBadge.textContent=item.badge;
  modalText.textContent=item.text;
  modalLink.href=item.link;
  modalLink.textContent="Open " + item.title + " pictures";
  modalList.innerHTML="";
  item.list.forEach(line=>{ const li=document.createElement("li"); li.textContent=line; modalList.appendChild(li); });
  overlay.classList.remove("hidden");
}
function closeReward(){ overlay.classList.add("hidden"); }
overlay.addEventListener("click",function(e){ if(e.target===overlay){ closeReward(); }});
createCards();
</script>
</body>
</html>
